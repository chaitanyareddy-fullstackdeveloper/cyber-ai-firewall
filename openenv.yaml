name: cyber-ai-firewall

tasks:
  - name: easy
  - name: medium
  - name: hard

environment:
  observation_space: tuple
  action_space:
    - allow
    - block
    - rate_limit

endpoints:
  reset:
    method: POST
    path: /reset

  step:
    method: POST
    path: /step

  state:
    method: GET
    path: /state